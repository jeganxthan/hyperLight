# ╔═══════════════════════════════════════════════════════════╗
# ║  HyDE Default Lock Screen — Standalone Port               ║
# ╚═══════════════════════════════════════════════════════════╝

# ── Dynamic Colors (Ported from Wallbash) ─────────────────────
$wallbash_pry1_rgba = rgba(15,26,42,0.95)
$wallbash_txt1_rgba = rgba(255,255,255,0.95)
$wallbash_txt2_rgba = rgba(255,255,255,0.85)
$wallbash_pry2_rgba = rgba(80,97,130,0.95)
$wallbash_pry4_rgba = rgba(209,118,139,0.95)
$wallbash_3xa9_rgba = rgba(212,143,255,0.95)
$wallbash_4xa9_rgba = rgba(255,143,169,0.95)
$text = rgba(255, 255, 255, 1.0)

# ── Path & Command Variables ────────────────────────────────
$fontFamily = JetBrainsMono Nerd Font
$BACKGROUND_PATH = /home/jegan/pictures/wallpapers/nytpixel.jpg
$MPRIS_IMAGE = /home/jegan/Desktop/Personal/HyDE/Source/assets/hyprdots_logo.png
$fn_greet = echo "Good $(date +%H | awk '{if ($1 < 12) print "Morning"; else if ($1 < 18) print "Afternoon"; else print "Evening"}'), ${USER}"
$BATTERY_ICON = echo "󰁹 $(cat /sys/class/power_supply/BAT0/capacity 2>/dev/null || echo 0)%"
$LAYOUT = hyprctl devices -j | jq -r '.keyboards[] | select(.main == true) | .active_keymap'

# ── General ──────────────────────────────────────────────────
general {
    no_fade_in = false
    grace = 0
    disable_loading_bar = false
    hide_cursor = true
}

# ── Background ──────────────────────────────────────────────
background {
    monitor =
    path = $BACKGROUND_PATH
    blur_passes = 2
    blur_size = 7
    brightness = 0.5
}

# ── Time ─────────────────────────────────────────────────────
label {
    monitor =
    text = $TIME
    color = $wallbash_txt1_rgba
    font_size = 90
    font_family = $fontFamily Bold
    position = -30, 0
    halign = right
    valign = top
}

# ── Date ─────────────────────────────────────────────────────
label {
    monitor =
    text = cmd[update:43200000] date +"%A, %d %B %Y"
    color = $wallbash_txt2_rgba
    font_size = 25
    font_family = $fontFamily
    position = -30, -150
    halign = right
    valign = top
}

# ── User Avatar ──────────────────────────────────────────────
image {
    monitor =
    path = $MPRIS_IMAGE
    size = 150
    rounding = -1 # Circle
    border_size = 4
    border_color = $wallbash_pry4_rgba
    position = 0, 0
    halign = center
    valign = center
}

# ── Input Field ──────────────────────────────────────────────
input-field {
    monitor =
    size = 280, 60
    outline_thickness = 3
    dots_size = 0.33
    dots_spacing = 0.15
    dots_center = true
    dots_rounding = -1
    outer_color = $wallbash_pry4_rgba
    inner_color = $wallbash_pry2_rgba
    font_color = $wallbash_txt1_rgba
    fade_on_empty = true
    fade_timeout = 1000
    placeholder_text = <span font_family="$fontFamily">Input Password...</span>
    hide_input = false
    rounding = -1
    check_color = $wallbash_pry4_rgba
    fail_color = rgba(255, 0, 0, 0.8)
    fail_text = <i>$FAIL <b>($ATTEMPTS)</b></i>
    fail_transition = 300
    position = 0, 80
    halign = center
    valign = bottom
}

# ── User Greeting ────────────────────────────────────────────
label {
    monitor =
    text = cmd[update:60000] $fn_greet
    color = $text
    font_size = 22
    font_family = $fontFamily Bold
    position = 0, -16%
    halign = center
    valign = center
}

# ── Battery Status ───────────────────────────────────────────
label {
    monitor =
    text = cmd[update:5000] $BATTERY_ICON
    color = $wallbash_4xa9_rgba
    font_size = 18
    font_family = $fontFamily
    position = -20, 20
    halign = right
    valign = bottom
}

# ── Keyboard Layout ──────────────────────────────────────────
label {
    monitor =
    text = cmd[update:1000] $LAYOUT
    color = $wallbash_4xa9_rgba
    font_size = 14
    font_family = $fontFamily
    position = -20, 60
    halign = right
    valign = bottom
}