# ╔═══════════════════════════════════════════════════════════╗
# ║  hyprlock — Smoked Glass                                  ║
# ║  Matches: wofi · dunst · swaync · kitty · waybar          ║
# ╚═══════════════════════════════════════════════════════════╝

# ── Background ───────────────────────────────────────────────
background {
    monitor     =
    path        = screenshot

    # blur
    blur_passes = 4
    blur_size   = 7

    # darken + desaturate for smoked feel
    noise            = 0.012
    contrast         = 0.90
    brightness       = 0.65
    vibrancy         = 0.08
    vibrancy_darkness = 0.40
}

# ── Clock ─────────────────────────────────────────────────────
label {
    monitor  =
    text     = $TIME
    font_family = JetBrainsMono Nerd Font
    font_size   = 72
    color    = rgba(e8e8f0f5)

    position = 0, 160
    halign   = center
    valign   = center

    shadow_passes = 3
    shadow_size   = 6
    shadow_color  = rgba(00000088)
    shadow_boost  = 1.2
}

# ── Date ──────────────────────────────────────────────────────
label {
    monitor  =
    text     = cmd[update:60000] date '+%A, %d %B %Y'
    font_family = JetBrainsMono Nerd Font
    font_size   = 14
    color    = rgba(9090a4cc)

    position = 0, 90
    halign   = center
    valign   = center

    shadow_passes = 2
    shadow_size   = 4
    shadow_color  = rgba(00000066)
}

# ── Input field ───────────────────────────────────────────────
input-field {
    monitor  =
    size     = 300, 52
    position = 0, -60
    halign   = center
    valign   = center

    outline_thickness = 1
    outer_color  = rgba(ffffff14)
    inner_color  = rgba(06060adc)
    font_color   = rgba(dcdce4f0)
    check_color  = rgba(ffffffff)
    fail_color   = rgba(ff6b6bdd)
    capslock_color = rgba(ffd580cc)

    placeholder_text = <span foreground="##606070">  password</span>
    fail_text        = <span foreground="##ff6b6b">  incorrect</span>

    fade_on_empty    = true
    fade_timeout     = 1200
    hide_input       = false

    rounding         = 12
    dots_size        = 0.26
    dots_spacing     = 0.24
    dots_center      = true
    dots_rounding    = -1

    shadow_passes    = 3
    shadow_size      = 8
    shadow_color     = rgba(00000099)
    shadow_boost     = 1.1
}

# ── Hint label ────────────────────────────────────────────────
label {
    monitor  =
    text     = Use fingerprint, or type password to unlock
    font_family = JetBrainsMono Nerd Font
    font_size   = 11
    color    = rgba(606070aa)

    position = 0, -120
    halign   = center
    valign   = center
}

# ── User avatar initial (optional — shows your first letter) ──
label {
    monitor  =
    text     = cmd[update:0] echo "${USER:0:1}" | tr '[:lower:]' '[:upper:]'
    font_family = JetBrainsMono Nerd Font
    font_size   = 28
    color    = rgba(9090a4cc)

    position = 0, 10
    halign   = center
    valign   = center
}