# ╔═══════════════════════════════════════════════════════════╗
# ║  Kitty — Smoked Glass+                                    ║
# ║  Matches: wofi · sidebarRight · waybar void-ribbon        ║
# ╚═══════════════════════════════════════════════════════════╝

# ── Font ─────────────────────────────────────────────────────
font_family      JetBrains Mono
bold_font        auto
italic_font      auto
bold_italic_font auto
font_size        12.0
adjust_line_height 108%
adjust_column_width 0

# ── Shell ─────────────────────────────────────────────────────
shell /home/jegan/.config/kitty/shell-launcher.sh
shell_integration enabled
clipboard_control write-clipboard write-primary no-append

# ── Cursor ────────────────────────────────────────────────────
cursor_shape          block
cursor_blink_interval 0
cursor                #aaaaaa
cursor_text_color     #06060a

# ── Window ────────────────────────────────────────────────────
window_padding_width        12
confirm_os_window_close     0
enable_audio_bell           no
visual_bell_duration        0.0
background_opacity          0.24
dynamic_background_opacity  yes
dim_opacity                 0.90
window_margin_width         4
hide_window_decorations     yes

# window border — hairline, matches wofi frame_width = 1
draw_minimal_borders        yes
window_border_width         1px
active_border_color         #3f3f47
inactive_border_color       #18181d
bell_border_color           #5a5a6a

# ── Tab bar ───────────────────────────────────────────────────
tab_bar_style               powerline
tab_powerline_style         slanted
tab_bar_background          #000000
tab_bar_margin_color        #000000
tab_separator               " ┇ "
active_tab_foreground       #dcdce4
active_tab_background       #2a2a32
inactive_tab_foreground     #606070
inactive_tab_background     #0a0a0e

# ── Colors — Smoked Glass palette ────────────────────────────
# base
foreground          #dcdce4
background          #000000
selection_foreground #e8e8f0
selection_background #2a2a34

# url
url_color           #9a9aaa
url_style           curly

# 16 ANSI colors — monochrome-anchored, matches your gray stack
# black
color0              #0a0a0e
color8              #2a2a32

# red — keep your warm red, just slightly tuned
color1              #ff6b6b
color9              #ff8787

# green
color2              #8bd49c
color10             #a4e8b1

# yellow
color3              #ffd580
color11             #ffe4a8

# blue → gray (matches your color4 philosophy — no true blue)
color4              #4a4a58
color12             #6a6a7a

# magenta → gray
color5              #6a6a7a
color13             #8a8a9a

# cyan → light gray
color6              #8a8a9a
color14             #aaaabc

# white
color7              #c8c8d4
color15             #e8e8f0

# ── Misc ──────────────────────────────────────────────────────
scrollback_lines        10000
copy_on_select          no
strip_trailing_spaces   smart
focus_follows_mouse     no
mouse_hide_wait         1.2
select_by_word_characters @-./_~?&=%+#
