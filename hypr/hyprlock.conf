# ╔═══════════════════════════════════════════════════════════╗
# ║  hyprlock — "Dark Monolith" Aesthetic                   ║
# ║  Zero-rounding, pure modern brutalism                   ║
# ╚═══════════════════════════════════════════════════════════╝

general {
    disable_loading_bar = true
    hide_cursor = true
    grace = 0
    no_fade_in = true
}

# ── Pure Dark Wallpaper Overlay ──────────────────────────────
background {
    monitor          =
    path             = cmd[update:0] cat ~/.config/hypr/.current_wallpaper

    blur_passes      = 1
    blur_size        = 2

    # Heavily darken the wallpaper instead of glassmorphism blur
    brightness       = 0.35
    contrast         = 1.1
    vibrancy         = 0.4
}

# ── Monolith Time Group (Bottom Left) ────────────────────────
label {
    monitor     =
    text        = $TIME
    font_family = JetBrains Mono ExtraBold
    font_size   = 110
    color       = rgba(255, 255, 255, 0.95)

    position    = 80, 150
    halign      = left
    valign      = bottom
}

label {
    monitor     =
    text        = cmd[update:60000] echo "$(date '+%A, %d %B %Y')"
    font_family = JetBrains Mono Medium
    font_size   = 22
    color       = rgba(200, 200, 200, 0.9)

    position    = 85, 100
    halign      = left
    valign      = bottom
}

# ── System Info (Top Right) ──────────────────────────────────
label {
    monitor     =
    text        = cmd[update:10000] echo "BAT: $(cat /sys/class/power_supply/BAT0/capacity 2>/dev/null)%"
    font_family = JetBrains Mono
    font_size   = 14
    color       = rgba(180, 180, 180, 0.8)

    position    = -60, -60
    halign      = right
    valign      = top
}

label {
    monitor     =
    text        = cmd[update:10000] echo "WIFI: $(nmcli -t -f active,ssid dev wifi | grep '^yes' | cut -d':' -f2 | head -1 || echo 'OFF')"
    font_family = JetBrains Mono
    font_size   = 14
    color       = rgba(180, 180, 180, 0.8)

    position    = -60, -90
    halign      = right
    valign      = top
}

# ── Sharp Password Input (Bottom Right) ──────────────────────
input-field {
    monitor   =
    size      = 280, 50
    position  = -60, 150
    halign    = right
    valign    = bottom

    # Zero rounding, brutalist aesthetic
    rounding          = 0
    outline_thickness = 2
    outer_color       = rgba(255, 255, 255, 0.1)
    inner_color       = rgba(0, 0, 0, 0.6)
    font_color        = rgba(255, 255, 255, 1.0)
    check_color       = rgba(100, 255, 100, 0.8)
    fail_color        = rgba(255, 50, 50, 0.8)

    placeholder_text  = <span font_family="JetBrains Mono"> > _ </span>
    fail_text         = <span font_family="JetBrains Mono"> ACCESS DENIED </span>

    fade_on_empty     = false
    hide_input        = false

    dots_size         = 0.25
    dots_spacing      = 0.2
    dots_center       = false
    dots_rounding     = 0 # Square dots
}

# ── User Name Header (Bottom Right, above input) ─────────────
label {
    monitor     =
    text        = USER: $USER
    font_family = JetBrains Mono Bold
    font_size   = 16
    color       = rgba(255, 255, 255, 0.8)

    position    = -60, 215
    halign      = right
    valign      = bottom
}